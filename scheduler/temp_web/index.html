<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>월간 80시간 근무 스케줄러</title>
    <!-- 모바일 PWA 메타 태그 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏱️</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 사이드바 패널 -->
        <aside class="sidebar">
            <div class="brand">
                <h1>⏱️ 타임 키퍼</h1>
                <p>월 최대 80시간 스마트 스케줄러</p>
            </div>

            <!-- 월간 요약 카드 -->
            <div class="summary-card glass-panel">
                <h3>이번 달 요약</h3>
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="label">총 근무 시간</span>
                        <div class="value"><strong id="total-hours">0</strong><span class="dim"> / 80 시간</span></div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="hours-progress"></div>
                </div>
                <div class="stats-row mt-3">
                    <div class="stat-item">
                        <span class="label">총 근무 일수</span>
                        <div class="value"><strong id="total-days">0</strong><span class="dim"> 일</span></div>
                    </div>
                </div>
            </div>

            <!-- 기본 근무 설정 -->
            <div class="settings-panel glass-panel">
                <h3>기본 근무 설정 (주간)</h3>
                <p class="desc">각 요일별 기본 근무 시간을 설정하세요.</p>
                <form id="default-schedule-form">
                    <div class="week-grid">
                        <div class="day-input"><label>월</label><input type="number" id="default-1" value="0" min="0" max="24" step="0.5"></div>
                        <div class="day-input"><label>화</label><input type="number" id="default-2" value="0" min="0" max="24" step="0.5"></div>
                        <div class="day-input"><label>수</label><input type="number" id="default-3" value="0" min="0" max="24" step="0.5"></div>
                        <div class="day-input"><label>목</label><input type="number" id="default-4" value="0" min="0" max="24" step="0.5"></div>
                        <div class="day-input"><label>금</label><input type="number" id="default-5" value="0" min="0" max="24" step="0.5"></div>
                        <div class="day-input"><label>토</label><input type="number" id="default-6" value="0" min="0" max="24" step="0.5"></div>
                        <div class="day-input"><label>일</label><input type="number" id="default-0" value="0" min="0" max="24" step="0.5"></div>
                    </div>
                    <button type="submit" class="btn-primary w-100">일괄 적용</button>
                </form>
            </div>

            <!-- 예외 기록 목록 (조회 전용) -->
            <div class="settings-panel glass-panel">
                <h3 style="margin-bottom: 0.2rem;">변동 및 휴무 기록</h3>
                <p class="desc" style="margin-bottom: 0.8rem; opacity: 0.8; font-size: 0.8rem;">일정 추가나 삭제는 달력의 날짜를 직접 클릭하세요.</p>
                <div class="exception-list-container" style="margin-top: 0;">
                    <ul id="exception-list" class="exception-list">
                        <!-- 예외 리스트 동적 삽입 -->
                    </ul>
                </div>
            </div>
            
            <button id="reset-btn" class="btn-secondary w-100" style="color: #fca5a5; border-color: rgba(239, 68, 68, 0.4); margin-top: auto; padding: 1rem; margin-bottom: 1rem; transition: background 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">🔄 모든 데이터 초기화</button>
        </aside>

        <!-- 메인 달력 영역 -->
        <main class="calendar-wrapper glass-panel">
            <header class="calendar-header">
                <button id="prev-month" class="icon-btn">&larr;</button>
                <div style="display:flex; gap: 1rem; align-items: center;">
                    <h2 id="current-month-display">2026년 3월</h2>
                    <button id="save-image-btn" class="btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" title="현재 달력을 이미지 파일로 캡처하여 다운로드합니다">💾 캡처 저장</button>
                </div>
                <button id="next-month" class="icon-btn">&rarr;</button>
            </header>
            
            <div class="calendar-grid-wrapper">
                <div class="calendar-days-header">
                    <div>일</div>
                    <div>월</div>
                    <div>화</div>
                    <div>수</div>
                    <div>목</div>
                    <div>금</div>
                    <div>토</div>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    <!-- 달력 셀 동적 삽입 -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- 캘린더 일자 클릭 시 표출되는 설정 모달 -->
    <div id="exception-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass-panel" style="background: rgba(30, 41, 59, 0.98);">
            <h3 id="modal-date-title" style="margin-bottom: 0.2rem; color: var(--primary-color);">설정</h3>
            <p class="desc" style="margin-bottom: 1.5rem;">선택한 날짜의 일정을 변경합니다.</p>
            <form id="modal-exception-form">
                <input type="hidden" id="modal-exception-date">
                <div class="radio-group" style="margin-bottom: 1.5rem;">
                    <label class="radio-btn">
                        <input type="radio" name="modal-exc-type" value="off" checked> <span>휴무 처리</span>
                    </label>
                    <label class="radio-btn">
                        <input type="radio" name="modal-exc-type" value="hours"> <span>근무 시간 변경</span>
                    </label>
                </div>
                <div class="form-group" id="modal-hours-input-wrapper" style="display:none; margin-bottom: 1.5rem;">
                    <input type="number" id="modal-exception-hours" placeholder="변경할 시간 (0-24)" min="0" max="24" step="0.5">
                </div>
                <div style="display: flex; gap: 0.8rem;">
                    <button type="submit" class="btn-primary w-100">저장</button>
                    <button type="button" id="modal-delete-btn" class="btn-danger w-100" style="display: none;">예외 취소</button>
                    <button type="button" id="modal-cancel-btn" class="btn-secondary w-100">닫기</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
    <script>
        // PWA를 위한 서비스 워커 등록 코드
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(reg => console.log('Service Worker Registered.', reg))
                .catch(err => console.error('Service Worker Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
